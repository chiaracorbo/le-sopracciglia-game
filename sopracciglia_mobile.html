const W=640,H=480,GROUND=440;
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
ctx.imageSmoothingEnabled=false;
function fit(){
  const mobile=window.innerWidth<=1024&&('ontouchstart' in window||navigator.maxTouchPoints>0);
  const s=Math.min(innerWidth/(W+8),innerHeight/(H+8),4);
  cv.style.width=(W*s)+'px';cv.style.height=(H*s)+'px';
}
addEventListener('resize',fit);fit();

/* ---------- AUDIO ---------- */
let AC=null;
function beep(f,d,type='square',v=.06,slide=0){
  try{ AC=AC||new (window.AudioContext||window.webkitAudioContext)();
    const o=AC.createOscillator(),g=AC.createGain();
    o.type=type;o.frequency.value=f;
    if(slide)o.frequency.linearRampToValueAtTime(Math.max(20,f+slide),AC.currentTime+d);
    g.gain.value=v;g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+d);
    o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+d);
  }catch(e){}
}
function noise(d,v=.08){try{AC=AC||new (window.AudioContext||window.webkitAudioContext)();
  const n=AC.createBufferSource(),buf=AC.createBuffer(1,AC.sampleRate*d,AC.sampleRate);
  const data=buf.getChannelData(0);for(let i=0;i<data.length;i++)data[i]=(Math.random()*2-1)*(1-i/data.length);
  n.buffer=buf;const g=AC.createGain();g.gain.value=v;n.connect(g);g.connect(AC.destination);n.start();}catch(e){}}
const sfx={
  hit:()=>{beep(180,.08,'square',.07,-60);noise(.05,.04)},
  kick:()=>{beep(120,.12,'square',.08,-50);noise(.07,.05)},
  block:()=>beep(420,.05,'triangle',.05),
  whoosh:()=>noise(.12,.05),
  special:()=>{beep(80,.3,'sawtooth',.08,200);beep(640,.15,'square',.04,-300)},
  chainsaw:()=>{for(let i=0;i<6;i++)setTimeout(()=>beep(70+Math.random()*50,.08,'sawtooth',.07),i*36)},
  ko:()=>{beep(300,.4,'sawtooth',.09,-220);setTimeout(()=>{beep(90,.6,'square',.08,-40);noise(.3,.09)},150)},
  sel:()=>beep(520,.05,'square',.05),
  ok:()=>beep(660,.1,'square',.06,120),
  boom:()=>{beep(55,.4,'sawtooth',.1,-25);noise(.25,.1)},
  zap:()=>beep(900,.22,'sawtooth',.06,-720),
  wave:()=>beep(220,.25,'sine',.07,160),
  buzz:()=>beep(110,.12,'square',.05,-30),
  casino:()=>{beep(300,.1,'square',.06,-100);setTimeout(()=>beep(200,.15,'square',.06,-120),100);setTimeout(()=>beep(120,.25,'square',.06,-80),220)},
  blinkS:()=>{beep(1100,.07,'sine',.05,-500);noise(.05,.03)},
  ready:()=>beep(880,.09,'sine',.05,220),
  parry:()=>{beep(1568,.12,'triangle',.09);setTimeout(()=>beep(784,.16,'square',.05,-200),60);noise(.06,.05);},
};

const SPRITE_SRC=window._SPRITE_SRC||{};

/* ---------- MUSICA (tracce embedded) ---------- */
const MUSIC_SRC=window._MUSIC_SRC||{};
const tracks={};
function _initTracks(src){
  for(const k in src){
    if(!tracks[k]){
      const a=new Audio(src[k]);a.loop=true;a.volume=0.45;a.preload='auto';tracks[k]=a;
    }
  }
}
_initTracks(MUSIC_SRC);
window._loadMusic=function(src){_initTracks(src);};
let curTrack=null,audioUnlocked=false,musicMuted=false,wantTrack='menu';
addEventListener('keydown',()=>{audioUnlocked=true;},{once:true});
function ensureMusic(){
  if(!audioUnlocked)return;
  if(musicMuted){if(curTrack&&!curTrack.paused)curTrack.pause();return;}
  const t=tracks[wantTrack];
  if(!t)return; // music.js non ancora caricato
  if(curTrack===t){if(t.paused)t.play().catch(()=>{});return;}
  if(curTrack){curTrack.pause();curTrack.currentTime=0;}
  curTrack=t;t.play().catch(()=>{});
}


/* ---------- COLOR UTILS (sfumature Metal Slug: shadow/base/highlight) ---------- */
function hex2rgb(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function shade(h,f){const[r,g,b]=hex2rgb(h);
  return '#'+[r,g,b].map(v=>Math.round(Math.max(0,Math.min(255,v*f))).toString(16).padStart(2,'0')).join('');}
function lift(h,a){const[r,g,b]=hex2rgb(h);
  return '#'+[r,g,b].map(v=>Math.round(Math.min(255,v+(255-v)*a)).toString(16).padStart(2,'0')).join('');}

const keys={};
addEventListener('keydown',e=>{keys[e.code]=true;
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code))e.preventDefault();});
addEventListener('keyup',e=>{keys[e.code]=false;});
const P1MAP={left:'ArrowLeft',right:'ArrowRight',up:'ArrowUp',down:'ArrowDown',punch:'KeyZ',kick:'KeyX',block:'KeyC',special:'Space'};
const P2MAP={left:'KeyA',right:'KeyD',up:'KeyW',down:'KeyS',punch:'KeyL',kick:'KeyK',block:'KeyJ',special:'KeyI'};

/* ---------- UTILS / FX GLOBALI ---------- */
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const rnd=(a,b)=>a+Math.random()*(b-a);
function aabb(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}
let particles=[],projectiles=[],floatTexts=[],frameTimers=[];
let shake=0,hitstop=0,frame=0,whiteFlash=0,specialBanner=null,specialCutIn=null,camX=0;
let vcfxFrame=0;
function setTimeoutFrames(fr,fn){frameTimers.push({fr,fn});}
function spark(x,y,col,n=8,sp=3){for(let i=0;i<n;i++)particles.push({x,y,vx:rnd(-sp,sp),vy:rnd(-sp,sp*.5),life:rnd(8,18),max:18,col,sz:rnd(2,5)});}
function blood(x,y,n=10){for(let i=0;i<n;i++)particles.push({x,y,vx:rnd(-3.5,3.5),vy:rnd(-5.5,-1),life:rnd(15,35),max:35,col:Math.random()<.7?'#FF0000':'#990000',sz:rnd(2,4),grav:.32,splat:true});}
function dust(x,y,n=6,big=false){for(let i=0;i<n;i++)particles.push({x:x+rnd(-8,8),y:y-rnd(0,4),vx:rnd(-1.4,1.4),vy:rnd(-1.4,-.3),life:rnd(10,16),max:16,col:Math.random()<.5?'#A9A9A9':'#8B7355',sz:big?rnd(4,7):rnd(3,5),fade:true});}
function ring(x,y,col,growth=4,maxR=100){particles.push({ring:true,x,y,r:8,growth,maxR,life:30,max:30,col});}
function smokePuff(x,y,n=8){for(let i=0;i<n;i++)particles.push({x:x+rnd(-10,10),y:y+rnd(-10,4),vx:rnd(-.8,.8),vy:rnd(-1.6,-.5),life:rnd(20,34),max:34,col:['#A9A9A9','#777','#999'][i%3],sz:rnd(5,9),fade:true});}
function ftext(x,y,txt,col,sz=10){floatTexts.push({x,y,txt,col,sz,life:45});}
function specialFX(f){
  const x=f.x,y=f.y-f.cfg.h*.55,fx=f.cfg.special.fx,cols=FX_COL[fx]||FX_COL.gold;
  ring(x,y,cols[0],5,95);ring(x,y,cols[1]||cols[0],3,60);
  fxBurst(x,y,fx,18);
  switch(f.cfg.id){
    case 'pisani':for(let i=0;i<5;i++)floatTexts.push({x:x+rnd(-46,46),y:y+rnd(-34,30),txt:'\u266A',col:'#C77DF0',sz:14+rnd(0,6),life:50});break;
    case 'bederico':for(let i=0;i<8;i++)particles.push({bar:true,x:x-60,y:y+rnd(-60,60),w:120,h:rnd(2,4),vx:0,vy:0,life:rnd(6,14),max:14,col:i%2?'#7DF9FF':'#FFFFFF'});break;
    case 'alice':case 'dimauro':for(let i=0;i<6;i++)particles.push({bar:true,x:x-f.facing*100,y:y+rnd(-40,40),w:70,h:2,vx:f.facing*7,vy:0,life:rnd(8,14),max:14,col:cols[i%cols.length]});break;
    case 'ettore':for(let i=0;i<5;i++)particles.push({star:true,x:x+rnd(-32,32),y:y+rnd(-44,12),vx:0,vy:-.5,life:22,max:22,col:'#FFFFFF',sz:3});break;
    case 'batteo':for(let i=0;i<6;i++)particles.push({x:x+rnd(-36,36),y:y+rnd(-50,30),vx:rnd(-1,1),vy:rnd(-2,0),life:rnd(8,14),max:14,col:'#FFFF00',sz:rnd(3,5)});break;
    case 'mango':for(let i=0;i<7;i++)particles.push({bar:true,x:x+f.facing*rnd(8,42),y:y+rnd(-22,30),w:rnd(6,14),h:2,vx:0,vy:0,life:rnd(6,12),max:12,col:'#00FF00'});break;
    case 'zibe':for(let i=0;i<5;i++)particles.push({bar:true,x:x+f.facing*16,y:y-12+i*6,w:38+i*7,h:2,vx:f.facing*4,vy:0,life:12,max:12,col:'#FFC27D'});break;
    case 'sito':smokePuff(x,y,12);break;
    case 'baumizio':smokePuff(x,y-10,10);ring(x,y,'#6B8E23',4,70);break;
    case 'iacopo':for(let i=0;i<10;i++)particles.push({x:x+rnd(-20,20),y:y+rnd(-20,20),vx:rnd(-2,2),vy:rnd(-3,-1),life:rnd(14,26),max:26,col:i%2?'#FFD700':'#FF6347',sz:rnd(2,4),grav:.12});break;
    case 'chiara':ring(x,y,'#E8C8FF',2,46);for(let i=0;i<5;i++)particles.push({star:true,x:x+rnd(-30,30),y:y+rnd(-40,20),vx:0,vy:-.8,life:22,max:22,col:'#C77DF0',sz:3});break;
  }
}
function fxBurst(x,y,fx,n=14){const cols=FX_COL[fx]||FX_COL.gold;
  for(let i=0;i<n;i++)particles.push({x,y,vx:rnd(-4,4),vy:rnd(-4,2),life:rnd(10,22),max:22,col:cols[i%cols.length],sz:rnd(2,5)});}

/* ---------- FIGHTER ---------- */
class Fighter{
  constructor(cfg,x,facing,ctrl){
    Object.assign(this,{cfg,x,facing,ctrl});
    this.name=cfg.name;this.maxHp=cfg.hp;this.hp=cfg.hp;this.stamina=100;this.meter=0;
    this.y=GROUND;this.vy=0;this.state='idle';this.moveFr=0;this.cur=null;
    this.combo=0;this.comboT=0;this.hitstun=0;this.blockHeld=false;this.hitConsumed=false;
    this.flash=0;this.counterT=0;this.selfStun=0;this.burstLeft=0;this.burstT=0;
    this.input={};this.prev={};this.pBuf=0;this.kBuf=0;this.jumpSquat=0;this.wasAir=false;this.blockFlash=0;
    this.cooldown=0;this.invuln=0;this.spinHits=0;this.spinHitFr=-9;this.comebackOn=false;
    this.atkLag=0;this.parryT=0;this.stars=0;this.parryCD=0;
    this.defMod=1.15-(cfg.def||5)*0.03;
    this.jumpV=-Math.sqrt(2*0.6*(45+(cfg.aer||5)*4))*(cfg.heavyJump?Math.sqrt(.9):1);
    this.ai={cool:0,plan:'approach',planT:0};this.animT=0;this.readyPing=false;
  }
  get half(){return this.cfg.h*0.17;}
  get dmgMul(){return (this.cfg.comeback&&this.hp/this.maxHp<0.4)?1.2:1;}
  get specialReady(){return this.meter>=this.cfg.special.cost&&this.cooldown<=0;}
  hurtbox(){const crouch=this.state==='crouch';const h=this.cfg.h*(crouch?0.6:1);
    return {x:this.x-this.half,y:this.y-h,w:this.half*2,h};}
  onGround(){return this.y>=GROUND-0.5;}

  readInput(opp){
    const p=this.prev,i={};
    if(this.ctrl==='cpu'){this.aiThink(opp);Object.assign(i,this.aiOut);}
    else{const m=this.ctrl;for(const k in m)i[k]=!!keys[m[k]];}
    i.punchP=i.punch&&!p.punch;i.kickP=i.kick&&!p.kick;i.upP=i.up&&!p.up;i.specialP=i.special&&!p.special;
    i.blockP=i.block&&!p.block;
    this.prev={punch:i.punch,kick:i.kick,up:i.up,special:i.special,block:i.block};
    this.input=i;
  }

  gainMeter(v){const was=this.specialReady;
    this.meter=clamp(this.meter+v,0,METER_MAX);
    if(!was&&this.specialReady){sfx.ready();this.readyPing=true;
      ftext(this.x,this.y-this.cfg.h-16,'SPECIAL PRONTA!',this.cfg.brow,9);}}

  update(opp){
    this.animT++;
    if(this.state==='ko'){if(this.y<GROUND){this.vy+=0.6;this.y=Math.min(GROUND,this.y+this.vy);}return;}
    if(this.cooldown>0)this.cooldown--;
    if(this.invuln>0)this.invuln--;
    if(this.stamina<100&&this.state!=='block'&&this.state!=='attack')
      this.stamina=Math.min(100,this.stamina+0.25*(this.dmgMul>1?1.5:1));
    if(this.cfg.comeback&&!this.comebackOn&&this.hp/this.maxHp<0.4){this.comebackOn=true;
      ftext(this.x,this.y-this.cfg.h-20,'COMEBACK! +20%','#FF4136',11);fxBurst(this.x,this.y-this.cfg.h*.5,'purple',14);sfx.ready();}
    this.gainMeter(1/12); // +5 al secondo
    if(this.comboT>0&&--this.comboT===0)this.combo=0;
    if(this.flash>0)this.flash--;
    if(this.blockFlash>0)this.blockFlash--;
    if(this.atkLag>0)this.atkLag--;
    if(this.parryT>0)this.parryT--;if(this.parryCD>0)this.parryCD--;
    if(this.stars>0)this.stars--;
    if(this.counterT>0)this.counterT--;
    if(this.pBuf>0)this.pBuf--; if(this.kBuf>0)this.kBuf--;
    if(this.selfStun>0){this.selfStun--;return;}
    if(this.hitstun>0){this.hitstun--;
      if(!this.onGround()){this.vy+=0.6;this.y=Math.min(GROUND,this.y+this.vy);}
      if(this.hitstun===0)this.state='idle';return;}

    const i=this.input;
    if(this.burstLeft>0){if(--this.burstT<=0){this.fireBurst();this.burstT=4;this.burstLeft--;}}

    if(this.state==='attack'){
      // cancel normale → special se secondo tasto arriva subito dopo
      if(this.moveFr<=4&&this.cur&&this.cur.key!=='special'&&
        ((this.cur.key==='punch'&&i.kickP)||(this.cur.key==='kick'&&i.punchP)||i.specialP))
        this.attemptSpecial(opp,true);
      this.advanceAttack(opp);
    }
    else{
      if(this.onGround())this.facing=opp.x>=this.x?1:-1;
      if(i.blockP&&this.parryCD<=0)this.parryT=12; // finestra di parry: tap appena prima dell'impatto
      this.blockHeld=i.block&&this.onGround()&&this.stamina>0;
      if(this.blockHeld){this.state='block';}
      else{
        let moving=false;
        if(this.jumpSquat>0){this.state='jumpsquat';
          if(--this.jumpSquat===0){this.vy=this.jumpV;this.y-=1;dust(this.x,GROUND,5);sfx.whoosh();}}
        else if(this.onGround()){
          if(i.down){this.state='crouch';}
          else{
            if(i.left){this.x-=this.cfg.speed;moving=true;}
            if(i.right){this.x+=this.cfg.speed;moving=true;}
            if(moving&&this.animT%14===0)dust(this.x-this.facing*this.half,GROUND,2);
            if(i.upP)this.jumpSquat=2;
            this.state=moving?'walk':'idle';
          }
        }else{
          if(i.left)this.x-=this.cfg.speed*0.8;
          if(i.right)this.x+=this.cfg.speed*0.8;
          this.state='jump';
        }
        // attacchi (solo a terra, non in crouch)
        if(this.onGround()&&!i.down&&this.jumpSquat===0){
          const wantSpecial=i.specialP||(i.punchP&&(i.kick||this.kBuf>0))||(i.kickP&&(i.punch||this.pBuf>0));
          if(wantSpecial)this.attemptSpecial(opp,false);
          else if(i.punchP&&this.atkLag<=0){this.pBuf=5;this.startMove('punch');}
          else if(i.kickP&&this.atkLag<=0){this.kBuf=5;this.startMove('kick');}
        }
      }
    }
    if(!this.onGround()){this.vy+=0.6;const wasAir=this.y<GROUND;this.y=Math.min(GROUND,this.y+this.vy);
      if(wasAir&&this.onGround()){dust(this.x,GROUND,7,true);if(this.state==='jump')this.state='idle';}}
    this.x=clamp(this.x,this.half+4,W-this.half-4);
  }

  startMove(key){
    const m=MOVES[key];
    this.stamina=Math.max(0,this.stamina-m.stCost);
    this.state='attack';this.hitConsumed=false;this.moveFr=0;
    this.cur={key,...m,recovery:Math.round(m.recovery*this.cfg.recMod)};
    if(key==='punch'&&this.cfg.punchDmg)this.cur.dmg=this.cfg.punchDmg;
    if(key==='kick'&&this.cfg.kickDmg)this.cur.dmg=this.cfg.kickDmg;
    this.cur.range+=(this.cfg.meleeR||0);
    if(key==='punch'&&this.cfg.punchRange)this.cur.range=this.cfg.punchRange;
    sfx.whoosh();
  }
  attemptSpecial(opp,fromCancel){
    const s=this.cfg.special;
    if(this.meter<s.cost||this.cooldown>0){
      if(!fromCancel){sfx.buzz();
        ftext(this.x,this.y-this.cfg.h-14,this.cooldown>0?'RICARICA!':'METER!','#FF4136',9);}return;}
    this.meter-=s.cost;this.cooldown=s.cd;this.startSpecial(opp);
  }
  startSpecial(opp){
    const s=this.cfg.special;
    this.state='attack';this.hitConsumed=false;this.moveFr=0;
    this.cur={key:'special',dmg:s.dmg,startup:s.st,active:s.act,
      recovery:Math.round(s.rec*this.cfg.recMod),range:s.w||50,hh:s.hh||44,yFrac:.5,kb:s.kb,sType:s.type,s};
    whiteFlash=2;specialBanner={txt:s.name+'!',t:22,col:this.cfg.brow};
    specialCutIn={f:this,t:22};hitstop=Math.max(hitstop,8);specialFX(this);
    if(s.type==='melee_big')sfx.chainsaw();
    else if(s.type==='waves')sfx.wave();
    else if(s.type==='blink')sfx.blinkS();
    else sfx.special();
    if(s.type==='counter')this.counterT=s.dur;
    if(s.type==='spin'){this.spinHits=0;this.spinHitFr=-9;}
    if(s.type==='blink')this.invuln=s.st+6;
    if(s.type==='waves')this.pendingWaves=s.at.map((f,idx)=>({fr:f,r:s.radii[idx],done:false}));
    fxBurst(this.x,this.y-this.cfg.h*0.6,s.fx,10);
  }
  advanceAttack(opp){
    const m=this.cur;this.moveFr++;
    const aS=m.startup,aE=m.startup+m.active;
    if(this.moveFr===aS&&m.key==='special')this.resolveSpecialStart(opp);
    if(m.sType==='waves'&&this.pendingWaves){
      for(const w of this.pendingWaves)if(!w.done&&this.moveFr===w.fr)this.fireWave(w,opp);}
    if(this.moveFr>=aS&&this.moveFr<aE)this.checkHit(opp);
    if(this.moveFr===aS&&m.key==='punch'&&this.cfg.punchProjectile)this.fireProjectile(this.cfg.punchProjectile);
    if(this.moveFr>=aE+m.recovery){this.atkLag=m.lag||0;this.state='idle';this.cur=null;this.pendingWaves=null;}
  }
  resolveSpecialStart(opp){
    const s=this.cur.s,t=this.cur.sType;
    if(t==='counter'||t==='waves')this.hitConsumed=true;
    if(t==='blink'){
      fxBurst(this.x,this.y-this.cfg.h*0.5,'yellow',12);whiteFlash=1;
      this.x=clamp(opp.x+this.facing*(opp.half+26),this.half+6,W-this.half-6);
      this.facing=opp.x>=this.x?1:-1;
      fxBurst(this.x,this.y-this.cfg.h*0.5,'yellow',12);}
    if(t==='hopburst'){this.vy=-5;this.y-=1;this.burstLeft=s.n;this.burstT=0;this.hitConsumed=true;}
    if(t==='cone'){for(let k=0;k<s.n;k++)projectiles.push({x:this.x+this.facing*26,y:this.y-this.cfg.h*0.55+rnd(-18,18),
      vx:this.facing*rnd(7,10),vy:rnd(-1,1),w:8,h:4,dmg:s.dmg,kb:s.kb,life:12,owner:this,col:'#FFC27D'});
      this.hitConsumed=true;sfx.boom();smokePuff(this.x+this.facing*30,this.y-this.cfg.h*0.55,5);}
    if(t==='dash'){this.x+=this.facing*s.dist*0.45;dust(this.x-this.facing*30,GROUND,8,true);}
    if(t==='grenade'){projectiles.push({x:this.x+this.facing*30,y:this.y-this.cfg.h*0.7,vx:this.facing*5.5,vy:-7.5,
      grav:.36,w:11,h:11,dmg:s.dmg,kb:s.kb,life:130,owner:this,col:'#6B8E23',aoe:s.r,bounceKill:true});
      this.hitConsumed=true;smokePuff(this.x+this.facing*26,this.y-this.cfg.h*0.7,4);}
    if(t==='lightning'){const tx=opp.x;sfx.zap();
      for(let i=0;i<8;i++)particles.push({x:tx+rnd(-12,12),y:GROUND-rnd(0,40),vx:0,vy:-1,life:16,max:16,col:'#7DF9FF',sz:3});
      setTimeoutFrames(18,()=>{spark(tx,GROUND-60,'#FFFFFF',26,6);
        for(let yy=0;yy<GROUND;yy+=14)particles.push({x:tx+rnd(-5,5),y:yy,vx:0,vy:0,life:8,max:8,col:'#FFFF99',sz:6});
        const hb={x:tx-20,y:GROUND-200,w:40,h:200};
        if(opp.state!=='ko'&&aabb(hb,opp.hurtbox()))opp.takeDamage(s.dmg*(this.cfg.power/7)*this.dmgMul,s.kb,this);
        sfx.boom();shake=Math.max(shake,9);whiteFlash=2;});
      this.hitConsumed=true;}
    if(t==='crit'&&Math.random()<s.failChance){this.hitConsumed=true;this.selfStun=24;sfx.casino();
      ftext(this.x,this.y-this.cfg.h-34,'CHE CASINO!','#FF6A00',11);dust(this.x,GROUND,8,true);}
  }
  fireWave(w,opp){
    w.done=true;sfx.wave();ring(this.x,this.y-this.cfg.h*0.5,'#9932CC',Math.max(3,w.r/9),w.r);
    fxBurst(this.x,this.y-this.cfg.h*0.5,'purple',8);
    const hb={x:this.x-w.r,y:this.y-this.cfg.h,w:w.r*2,h:this.cfg.h};
    if(opp.state!=='ko'&&aabb(hb,opp.hurtbox()))
      opp.takeDamage(this.cur.s.dmg*(this.cfg.power/7)*this.dmgMul,this.cur.s.kb,this);
  }
  fireBurst(){const s=this.cfg.special;
    projectiles.push({x:this.x+this.facing*24,y:this.y-this.cfg.h*0.6+rnd(-8,8),vx:this.facing*10,vy:0,
      w:9,h:3,dmg:s.dmg,kb:s.kb,life:28,owner:this,col:'#00BFFF'});beep(740,.04,'square',.04);}
  fireProjectile(p){const n=p.pellets||1;
    for(let k=0;k<n;k++)projectiles.push({x:this.x+this.facing*28,y:this.y-this.cfg.h*0.6+rnd(-10,10),
      vx:this.facing*p.spd,vy:n>1?rnd(-1,1):0,w:p.w,h:p.hh,dmg:p.dmg,kb:4,life:p.life,owner:this,col:p.col});
    beep(620,.04,'square',.04);}

  checkHit(opp){
    if(this.hitConsumed)return;
    const m=this.cur;
    let reach=m.range,hh=m.hh||34;
    if(m.sType==='grab'){reach=m.s.reach*Math.min(1,(this.moveFr-m.startup+1)/m.active);hh=30;}
    let hb;
    if(m.sType==='spin'){const r=m.s.r;hb={x:this.x-r,y:this.y-this.cfg.h*0.9,w:r*2,h:this.cfg.h*0.9};}
    else hb={x:this.facing>0?this.x+this.half-6:this.x-this.half+6-reach,
      y:this.y-this.cfg.h*m.yFrac-hh/2,w:reach,h:hh};
    if(opp.state!=='ko'&&aabb(hb,opp.hurtbox())){
      if(m.sType==='spin'){
        if(this.spinHits>=(m.s.hits||3)||this.moveFr-this.spinHitFr<3)return;
        this.spinHits++;this.spinHitFr=this.moveFr;
        const tick=(m.dmg/(m.s.hits||3))*(this.cfg.power/7)*this.dmgMul;
        opp.takeDamage(tick*COMBO_MUL[Math.min(this.combo,3)],m.kb/(m.s.hits||3)+6,this);
        fxBurst(opp.x,opp.y-opp.cfg.h*0.6,m.s.fx,8);
        return;}
      this.hitConsumed=true;
      let dmgBase=m.dmg;
      if(m.key==='special'&&m.s.airDmg&&!opp.onGround())dmgBase=m.s.airDmg;
      const base=dmgBase*(this.cfg.power/7)*this.dmgMul;
      opp.takeDamage(base*COMBO_MUL[Math.min(this.combo,3)],m.kb,this);
      if(m.key==='special')fxBurst(opp.x,opp.y-opp.cfg.h*0.6,m.s.fx,16);
      if(m.sType==='grab'){sfx.boom();shake=Math.max(shake,10);whiteFlash=1;}
    }
  }
  registerHit(){this.combo=Math.min(this.combo+1,99);this.comboT=COMBO_WIN;this.gainMeter(12);}

  takeDamage(raw,kb,attacker){
    if(this.state==='ko')return;
    if(this.invuln>0){ftext(this.x,this.y-this.cfg.h-10,'MISS!','#FFE94A',10);
      spark(this.x,this.y-this.cfg.h*.5,'#FFE94A',5,2);return;}
    raw*=this.defMod;
    if(this.counterT>0){this.counterT=0;sfx.special();whiteFlash=1;
      ftext(this.x,this.y-this.cfg.h-26,'CONTROMOSSA!','#9B59B6',11);
      fxBurst(this.x,this.y-this.cfg.h*0.5,'purple',16);
      attacker.takeDamage(this.cfg.special.dmg*((this.cfg.power+3)/7),this.cfg.special.kb,this);
      return;}
    let dmg=raw,blocked=false;
    if(this.blockHeld&&this.parryT>0&&this.state!=='attack'){
      this.parryT=0;this.stamina=Math.max(0,this.stamina-3);this.invuln=Math.max(this.invuln,10);
      attacker.selfStun=80;attacker.stars=80;attacker.cur=null;attacker.state='idle';
      attacker.burstLeft=0;attacker.pendingWaves=null;attacker.hitstun=0;
      whiteFlash=1;sfx.parry();shake=Math.max(shake,5);hitstop=Math.max(hitstop,5);
      ftext(this.x,this.y-this.cfg.h-22,'PARRY! +25','#FFE94A',13);this.gainMeter(25);this.parryCD=90;
      ftext(attacker.x,attacker.y-attacker.cfg.h-14,'STORDITO!','#FF8C00',10);
      ring(this.x+this.facing*(this.half+6),this.y-this.cfg.h*.55,'#FFFFFF',4,42);
      fxBurst(attacker.x,attacker.y-attacker.cfg.h*.8,'yellow',10);
      return;}
    if(this.blockHeld&&this.state!=='attack'){dmg*=0.5;blocked=true;
      this.blockFlash=8;this.gainMeter(4);
      this.stamina=Math.max(0,this.stamina-2);sfx.block(); // costo fisso 2 per parata
      spark(this.x+this.facing*this.half,this.y-this.cfg.h*0.55,'#9CC4FF',10,3);
      spark(this.x+this.facing*this.half,this.y-this.cfg.h*0.55,'#FFFFFF',5,2);
      ring(this.x+this.facing*(this.half+6),this.y-this.cfg.h*0.55,'#9CC4FF',3,26);
      if(this.stamina===0){this.blockHeld=false;this.selfStun=20;
        ftext(this.x,this.y-this.cfg.h-18,'GUARDIA ROTTA!','#FF4136',11);
        fxBurst(this.x,this.y-this.cfg.h*0.55,'blue',14);sfx.casino();}}
    else{this.state='hitstun';this.hitstun=8+Math.floor(kb/5);
      attacker.registerHit();this.gainMeter(6);this.flash=6;
      blood(this.x,this.y-this.cfg.h*0.6,dmg>10?14:7);
      spark((this.x+attacker.x)/2,this.y-this.cfg.h*0.6,'#FFFF00',8,3);
      spark((this.x+attacker.x)/2,this.y-this.cfg.h*0.6,'#FFFFFF',4,2);
      (kb>12?sfx.kick:sfx.hit)();
      hitstop=dmg>14?6:3;shake=Math.max(shake,Math.min(10,kb/4));}
    this.hp=Math.max(0,this.hp-Math.round(dmg));
    this.x+=kb*attacker.facing*(blocked?0.4:1);
    if(!blocked)ftext(this.x,this.y-this.cfg.h-8,Math.round(dmg),'#FFF',10);
    if(this.hp===0){this.state='ko';this.vy=-7;this.hitstun=0;sfx.ko();shake=12;
      blood(this.x,this.y-this.cfg.h*0.5,26);game.onKO(this);}
  }

  /* -------- CPU AI v1.1 — behavior tree potenziato -------- */
  aiThink(opp){
    const a=this.ai;a.cool--;
    if(a.retreat===undefined)a.retreat=0;
    if(a.doublePunch===undefined)a.doublePunch=0;
    if(a.parryHold===undefined)a.parryHold=0;
    if(a.jumpAtk===undefined)a.jumpAtk=0;
    if(a.wakeUp===undefined)a.wakeUp=0;
    if(a.zoneT===undefined)a.zoneT=0;
    const d=this.aiDiff||{freq:1,parry:.2};
    const dx=opp.x-this.x,dist=Math.abs(dx)-this.half-opp.half,dir=Math.sign(dx)||1;
    const o={left:false,right:false,up:false,down:false,punch:false,kick:false,block:false,special:false};
    const hpr=this.hp/this.maxHp,ohpr=opp.hp/opp.maxHp;
    const sType=this.cfg.special.type;
    const hasProj=!!this.cfg.punchProjectile;
    const sRange=sType==='waves'?90:sType==='lightning'?240:sType==='blink'?160:sType==='grenade'?220:sType==='dash'?150:sType==='grab'?130:sType==='cone'?170:90;

    // PARRY reattivo: finestra parry aumentata, rispetta parryCD
    if(a.parryHold>0){a.parryHold--;o.block=true;this.aiOut=o;return;}
    if(this.parryCD<=0&&opp.state==='attack'&&opp.cur&&opp.cur.key!=='special'){
      const fr=opp.cur.startup-opp.moveFr;
      if(fr<=3&&fr>=0&&dist<70&&Math.random()<d.parry){a.parryHold=8;o.block=true;this.aiOut=o;return;}}

    // WAKE-UP PRESSURE: insegui dopo knockdown
    if(opp.state==='ko'||opp.hitstun>30)a.wakeUp=22;
    if(a.wakeUp>0){a.wakeUp--;
      if(dir>0)o.right=true;else o.left=true;
      if(dist<50&&a.cool<=0){o.punch=true;a.cool=14*d.freq;}
      this.aiOut=o;return;}

    // ZONING: proiettile a media distanza
    if(a.zoneT>0)a.zoneT--;
    if(hasProj&&dist>90&&dist<200&&a.cool<=0&&a.zoneT<=0&&Math.random()<.35){
      o.punch=true;a.cool=22*d.freq;a.zoneT=60;this.aiOut=o;return;}

    // STATO: 6 stati
    let st;
    if(hpr<0.25)st='comeback';
    else if(hpr<0.5)st='defensive';
    else if(ohpr<0.3&&dist<80)st='finisher';
    else if(dist>90)st='approach';
    else if(dist>35)st='neutral';
    else st='aggression';

    if(a.retreat>0){a.retreat--;if(dir>0)o.left=true;else o.right=true;}

    if(st==='approach'){
      if(dir>0)o.right=true;else o.left=true;
      if(a.cool<=0&&dist<130&&Math.random()<.18&&a.jumpAtk<=0){
        o.up=true;if(dir>0)o.right=true;else o.left=true;o.kick=true;a.jumpAtk=40;a.cool=28*d.freq;}
      if(opp.cur&&opp.cur.key==='special'&&Math.random()<.5)o.up=true;
    }else if(st==='neutral'){
      if(a.cool<=0&&a.retreat<=0){const r=Math.random();
        if(r<.35){o.punch=true;a.cool=14*d.freq;}
        else if(r<.60){o.kick=true;a.cool=22*d.freq;}
        else if(r<.74){a.retreat=18;a.cool=10;}
        else if(r<.88){o.up=true;if(dir>0)o.right=true;else o.left=true;a.cool=22;}
        else if(r<.95){o.down=true;a.cool=10;}
        else{o.block=true;a.cool=16;}}
    }else if(st==='aggression'){
      if(this.specialReady&&dist<sRange&&a.cool<=0&&opp.onGround()&&Math.random()<.8){o.punch=true;o.kick=true;a.cool=36*d.freq;}
      else if(opp.blockHeld&&Math.random()<.45&&a.retreat<=0){a.retreat=14;}
      else if(a.cool<=0&&a.retreat<=0){
        if(a.doublePunch>0){a.doublePunch--;o.punch=true;a.cool=15*d.freq;}
        else{const r=Math.random();
          if(r<.5){o.punch=true;a.doublePunch=1;a.cool=15*d.freq;}
          else if(r<.78){o.kick=true;a.cool=22*d.freq;}
          else{o.up=true;o.kick=true;a.cool=22;}}}
    }else if(st==='defensive'){
      if(opp.state==='attack'&&dist<80)o.block=Math.random()<(.55+d.parry*.3);
      if(a.cool<=0&&a.retreat<=0){const r=Math.random();
        if(r<.32){a.retreat=20;a.cool=12;}
        else if(r<.55&&dist<65){o.kick=true;a.cool=24*d.freq;}
        else if(r<.68&&this.specialReady&&dist<sRange){o.punch=true;o.kick=true;a.cool=40*d.freq;}
        else if(r<.82&&dist<50){o.punch=true;a.cool=16*d.freq;}
        else a.cool=10;}
      if(dist>110){if(dir>0)o.right=true;else o.left=true;}
    }else if(st==='finisher'){
      if(this.specialReady&&dist<Math.max(sRange,100)&&a.cool<=0){o.punch=true;o.kick=true;a.cool=30*d.freq;}
      else if(a.cool<=0){if(dist>36){if(dir>0)o.right=true;else o.left=true;}
        else{const r=Math.random();
          if(r<.55){o.punch=true;a.cool=13*d.freq;}else{o.kick=true;a.cool=20*d.freq;}}}
    }else if(st==='comeback'){
      if(this.specialReady&&dist<Math.max(sRange,130)&&a.cool<=0){o.punch=true;o.kick=true;a.cool=32*d.freq;}
      else if(a.cool<=0){const r=Math.random();
        if(r<.28){o.up=true;if(dir>0)o.right=true;else o.left=true;a.cool=16;}
        else if(r<.55){if(dist>36){if(dir>0)o.right=true;else o.left=true;}else{o.punch=true;a.cool=12*d.freq;}}
        else if(r<.8&&dist<65){o.kick=true;a.cool=22*d.freq;}
        else{o.block=true;a.cool=14;}}
    }
    if(a.jumpAtk>0)a.jumpAtk--;
    this.aiOut=o;
  }
}

/* ---------- RENDERING PERSONAGGI — Metal Slug pass ---------- */
const ofs=document.createElement('canvas');ofs.width=360;ofs.height=320;
const octx=ofs.getContext('2d');octx.imageSmoothingEnabled=false;
const sil=document.createElement('canvas');sil.width=360;sil.height=320;
const sctx=sil.getContext('2d');sctx.imageSmoothingEnabled=false;
const OX=180,OY=300; // origine piedi dentro l'offscreen

function opx(x,y,w,h,c){octx.fillStyle=c;octx.fillRect(Math.round(x),Math.round(y),Math.round(w),Math.round(h));}

function drawFighter(f){
  const c=f.cfg;
  octx.clearRect(0,0,360,320);
  octx.save();octx.translate(OX,OY);
  const koLay=f.state==='ko';
  if(koLay){octx.rotate(f.facing*-Math.PI/2);octx.translate(0,c.h*0.16);}
  octx.scale(f.facing,1);
  // squash & stretch
  let sy=1;
  if(f.state==='jumpsquat'||f.state==='crouch')sy=f.state==='crouch'?0.62:0.85;
  if(!f.onGround()&&f.vy<-2)sy=1.06;
  octx.scale(1,sy);
  renderBody(f,c);
  octx.restore();

  // outline nero (silhouette pass) + corpo
  sctx.clearRect(0,0,360,320);
  sctx.drawImage(ofs,0,0);
  sctx.globalCompositeOperation='source-in';
  sctx.fillStyle=f.flash>0?'#FFFFFF':'#000000';
  sctx.fillRect(0,0,360,320);
  sctx.globalCompositeOperation='source-over';
  const dx=Math.round(f.x-OX),dy=Math.round(f.y-OY);
  for(const[ox,oy]of[[-2,0],[2,0],[0,-2],[0,2],[-1,-1],[1,-1],[-1,1],[1,1]])
    ctx.drawImage(sil,dx+ox,dy+oy);
  if(f.flash>0)ctx.drawImage(sil,dx,dy);else ctx.drawImage(ofs,dx,dy);

  // aure post (in world space)
  if(f.counterT>0){ctx.strokeStyle='#9B59B6';ctx.lineWidth=2;ctx.globalAlpha=.5+.3*Math.sin(frame*.4);
    ctx.strokeRect(f.x-f.half-8,f.y-c.h-8,f.half*2+16,c.h+8);ctx.globalAlpha=1;}
  if(c.meta&&frame%7===0){ctx.globalAlpha=.22;ctx.fillStyle='#FFFFFF';
    ctx.fillRect(f.x-f.half+rnd(-3,3),f.y-rnd(0,c.h),f.half*2,3);ctx.globalAlpha=1;}
  // RIM LIGHT: striscia luminosa laterale
  if(f.state!=='ko'&&!f.blockFlash){const rimA=.2+.07*Math.sin(frame*.06);
    ctx.globalAlpha=rimA;ctx.fillStyle=lift(f.cfg.brow,.3)||'#FFFFFF';
    ctx.fillRect(Math.round(f.x+f.facing*(f.half-1)),Math.round(f.y-c.h*.9),2,Math.round(c.h*.82));
    ctx.globalAlpha=1;}
  // stelline da stordimento (parry subito)
  if(f.stars>0&&f.state!=='ko'){for(let s2=0;s2<3;s2++){const an=frame*.15+s2*2.09;
    const sx2=f.x+Math.cos(an)*18,sy2=f.y-c.h-8+Math.sin(an)*5;
    ctx.fillStyle='#FFE94A';ctx.fillRect(sx2-1,sy2-3,2,6);ctx.fillRect(sx2-3,sy2-1,6,2);}}
  // scudo di parata
  if((f.state==='block'||f.blockFlash>0)&&f.state!=='ko'){
    const al=f.blockFlash>0?.6:(.28+.1*Math.sin(frame*.3));
    ctx.globalAlpha=al;ctx.fillStyle=f.blockFlash>0?'#CFE6FF':'#9CC4FF';
    const sx=f.x+f.facing*(f.half+5);
    ctx.fillRect(sx-(f.facing>0?0:6),f.y-c.h*.92,6,c.h*.9);
    ctx.fillRect(sx+f.facing*6-(f.facing>0?0:2),f.y-c.h*.84,2,c.h*.74);
    ctx.globalAlpha=1;}
  // glow sopracciglia quando special pronta (3 flash/sec)
  if(f.specialReady&&f.state!=='ko'&&frame%20<10){
    ctx.globalAlpha=.35;ctx.fillStyle=lift(c.brow,.5);
    ctx.beginPath();ctx.arc(f.x+f.facing*c.h*0.06,f.y-c.h*0.88,14,0,7);ctx.fill();ctx.globalAlpha=1;}
}

function renderBody(f,c){
  const hgt=c.h;
  const base=c.fur,shadow=shade(c.fur,.62),shadow2=shade(c.fur,.44),hi=lift(c.fur,.28),hi2=lift(c.fur,.52);
  const oBase=c.outfit,oShad=shade(c.outfit,.55),oHi=lift(c.outfit,.26),oHi2=lift(c.outfit,.48);
  const breath=Math.sin(f.animT*.07)*1.5;
  const bob=f.state==='walk'?Math.sin(f.animT*.3)*2.5:(f.state==='idle'?breath*.8:0);
  const step=f.state==='walk'?Math.sin(f.animT*.3):0;
  const legH=hgt*.24,bodyH=hgt*.32,neckH=c.species==='alpaca'?hgt*.15:hgt*.05,headH=hgt*.2;
  const bw=hgt*.3*(c.buff?1.45:1);
  const att=f.state==='attack'&&f.cur;
  const blocking=f.state==='block';
  let t=0;
  if(att){const m=f.cur,tot=m.startup+m.active;t=clamp(f.moveFr/tot,0,1);}
  // drop shadow a terra (spec: 2px giù, 40% opacity)
  octx.globalAlpha=.4;opx(-bw*.85,0,bw*1.7,5,'#000');octx.globalAlpha=.22;opx(-bw*.75,4,bw*1.5,3,'#000');octx.globalAlpha=1;
  const lean=att?Math.sin(Math.min(1,t*1.2)*Math.PI)*4:0;
  octx.translate(lean,0);
  // CAPE (Pisani) con pieghe multiple e rim light reale
  if(c.cape){const fl=Math.sin(f.animT*.1)*5;
    opx(-bw*.95-fl*.4,-legH-bodyH-2,bw*.5,bodyH+legH*.7,oBase);
    opx(-bw*.95-fl*.4,-legH-bodyH-2,bw*.12,bodyH+legH*.7,shadow2);
    opx(-bw*.52-fl*.3,-legH-bodyH+4,bw*.08,bodyH+legH*.55,oHi);
    for(let yy=0;yy<bodyH+legH*.6;yy+=8){opx(-bw*.9-fl*.4+((yy>>3)%2)*5,-legH-bodyH+yy,bw*.38,3,yy%16<8?shade(oBase,.78):oBase);}
    opx(-bw*.95-fl*.4,-legH*.36,bw*.5,4,'#C9A227');opx(-bw*.95-fl*.4,-legH*.36,bw*.5,1,lift('#C9A227',.5));}
  // COAT (Baumizio) con bavero
  if(c.coat){const fl=Math.sin(f.animT*.12)*3;
    opx(-bw*.64,-legH-bodyH,bw*.22,bodyH+legH*.78+fl*.3,oShad);opx(-bw*.64,-legH-bodyH,3,bodyH+legH*.5,shadow2);
    opx(bw*.42,-legH-bodyH,bw*.22,bodyH+legH*.78-fl*.3,oShad);opx(bw*.62,-legH-bodyH,3,bodyH+legH*.5,oHi);}
  // BACKPACK mech (Mango) con circuiti e cavi
  if(c.mech){const yB0=-legH-bodyH+bob,pulse=.5+.5*Math.sin(frame*.18);
    opx(-bw*.5-12,yB0+2,14,bodyH*.85,'#8A929A');opx(-bw*.5-12,yB0+2,14,3,'#C0C8D0');opx(-bw*.5-12,yB0+2,3,bodyH*.85,'#6A7278');
    opx(-bw*.5-11,yB0+7,4,3,'#E04040');opx(-bw*.5-11,yB0+12,4,3,pulse>.7?'#80FF80':'#40C840');
    opx(-bw*.5-11,yB0+18,8,2,'#E0A030');
    for(let cyy=0;cyy<bodyH*.6;cyy+=8)opx(-bw*.5-9,yB0+22+cyy,2,4,cyy%16<8?'#00AA00':'#006600');}
  // GAMBE con volumi
  const thigh=legH*.55,shin=legH*.55;
  const legBase=c.legCol||base,legShad=c.legCol?shade(c.legCol,.72):shadow;
  for(const s of[-1,1]){
    const ph=step*s,kx=s<0?-bw*.3:bw*.1,lift_=Math.max(0,ph)*5,scol=s<0?shadow2:legShad;
    opx(kx+ph*4,-legH+lift_*.3,c.buff?10:8,thigh,scol);
    opx(kx+ph*3,-legH+lift_*.3,c.buff?4:3,thigh,s>0?hi:'transparent');// highlight coscia
    opx(kx+ph*6,-legH+thigh-2+lift_*.2,c.buff?9:7,shin,scol);
    if(c.mech)opx(kx+ph*7-2,-7,14,8,'#F0EDE8');
    else{opx(kx+ph*7-2,-6,12,7,shade(c.legCol||oBase,.5));opx(kx+ph*7,-6,3,4,lift(c.legCol||oBase,.3));}}
  // BRACCIO DIETRO
  const armY=-legH-bodyH*.78+bob,swing=step*6;
  opx(-bw*.44-swing*.6,armY+4,c.buff?11:8,bodyH*.6,shadow);
  opx(-bw*.44-swing*.6,armY+4,3,bodyH*.45,shadow2);
  if(c.gloves)opx(-bw*.44-swing*.6,armY+4+bodyH*.6-7,c.buff?11:8,7,c.gloves);
  // TORSO con 4 livelli shading isometrico
  const yB=-legH-bodyH+bob;
  opx(-bw/2,yB,bw,bodyH,oBase);
  opx(-bw/2,yB,bw*.2,bodyH,shadow2);       // shadow lato schiena
  opx(-bw*.24,yB,bw*.08,bodyH,oShad);      // shadow mid
  opx(bw*.1,yB+2,bw*.28,bodyH*.45,oHi);    // highlight petto
  opx(bw*.22,yB+2,bw*.1,bodyH*.3,oHi2);   // highlight spalla
  opx(-bw*.32,yB+bodyH*.38,bw*.64,2,oShad);
  opx(-bw*.22,yB+bodyH*.6,bw*.48,2,oShad);
  opx(-bw/2,yB,bw,4,hi);
  // pieghe tessuto
  for(let fy=0;fy<bodyH;fy+=10)if(fy%20<10)opx(-bw*.28,yB+fy,bw*.58,1,oShad);
  // rim light sul lato destro (verso camera)
  opx(bw*.48,yB+6,2,bodyH-10,oHi2);
  // VEST centrale (Sito)
  if(c.vest){opx(-5,yB+3,11,bodyH-6,c.vest);opx(-5,yB+3,4,bodyH-6,shade(c.vest,.65));
    opx(-5,yB+3,11,2,lift(c.vest,.4));opx(4,yB+3,2,bodyH-6,lift(c.vest,.35));}
  // TRIM pelliccia con ciuffi
  if(c.trim){opx(-bw/2,yB,5,bodyH,c.trim);opx(bw/2-5,yB,5,bodyH,c.trim);
    for(let i=0;i<5;i++){opx(-bw/2+1,yB+3+i*9,3,5,lift(c.trim,.3));opx(bw/2-4,yB+3+i*9,3,5,lift(c.trim,.3));}}
  // SASH
  if(c.sash){for(let i=0;i<bodyH-4;i+=3){opx(-bw*.43+(i/bodyH)*bw*.82,yB+2+i,9,3,(i%8<4)?c.sash.a:c.sash.b);}
    opx(-bw*.32+bodyH*.3/bodyH*bw*.62,yB+bodyH*.3,4,4,'#FFE94A');}
  // BOTTONI con highlight
  if(c.buttons)for(let k=0;k<3;k++){const by=yB+7+k*Math.max(8,bodyH*.22);
    opx(bw*.17,by,5,5,c.buttons);opx(bw*.17,by,5,1,lift(c.buttons,.5));opx(bw*.17,by,2,2,oHi2);}
  // COLLARE dorato Alice
  if(c.collarBand){opx(-bw/2,yB-3,bw,7,c.collarBand);opx(-bw/2,yB-3,bw,2,lift(c.collarBand,.5));
    for(let i=0;i<bw-6;i+=6)opx(-bw/2+3+i,yB,3,2,shade(c.collarBand,.55));}
  // ARMATURA Ettore: piastre con riflessi metallici completi
  if(c.armor){const af=c.armor;
    opx(-bw*.36,yB+3,bw*.72,bodyH*.82,af.frame);opx(-bw*.36,yB+3,bw*.16,bodyH*.82,shade(af.frame,.6));
    opx(-bw*.28,yB+6,bw*.56,bodyH*.68,af.plate);opx(-bw*.28,yB+6,bw*.14,bodyH*.68,shade(af.plate,.7));
    opx(-bw*.28,yB+6,bw*.56,3,lift(af.plate,.55));opx(-bw*.14,yB+8,bw*.18,bodyH*.5,lift(af.plate,.28));
    opx(-bw*.08,yB+bodyH*.28,10,10,af.frame);opx(-bw*.06,yB+bodyH*.31,4,5,shade(af.frame,.6));opx(-bw*.07,yB+bodyH*.28,3,2,oHi2);
    opx(-bw*.64,yB-4,bw*.36,10,af.frame);opx(bw*.28,yB-4,bw*.36,10,af.frame);
    opx(-bw*.64,yB-4,bw*.36,2,'#E8ECF0');opx(bw*.28,yB-4,bw*.36,2,'#E8ECF0');
    opx(-bw*.6,yB,3,8,shadow2);opx(bw*.58,yB,3,8,oHi2);}
  // MECH chest (Mango): più dettagli circuiti
  if(c.mech){const pulse=.5+.5*Math.sin(frame*.15),pulse2=.5+.5*Math.sin(frame*.15+2);
    opx(-bw*.44,yB+2,bw*.88,bodyH*.86,'#AEB6BE');opx(-bw*.44,yB+2,bw*.2,bodyH*.86,'#8A929A');
    opx(-bw*.44,yB+2,bw*.88,3,'#D8DEE4');opx(bw*.36,yB+4,4,bodyH*.76,'#C8D0D8');

function drawWeapon(f,wx,wy,att,t){

  const lunge=att&&f.cur.key!=='kick'?Math.sin(Math.min(1,t*1.2)*Math.PI)*16:0;
  const sp=att&&f.cur.key==='special';
  switch(c.weapon){
    case 'segaspada':{

      opx(lunge,-4,50,9,'#8A8A8A');opx(lunge,-4,50,3,'#C8CDD0');opx(lunge,-4,50,1,'#FFFFFF');
      opx(lunge+12,-4,12,9,'#E8ECEE');opx(lunge+32,-4,8,9,'#E8ECEE');
      opx(lunge,4,50,2,'#3C3C3C');

      for(let i=0;i<3;i++)opx(lunge-8,i*4-5,9,2,'#4A2A10');
      for(let i=0;i<9;i++)opx(lunge+3+i*5+(sp?(frame%4):0),-7,3,4,sp?'#FFE94A':'#505050');
      if(!att&&frame%6<3){opx(lunge+10,-8,4,3,'rgba(200,200,200,.3)');opx(lunge+24,-8,3,3,'rgba(200,200,200,.25)');}
      if(sp)fxBurst(f.x+f.facing*(wx+lunge+30),f.y-f.cfg.h*.55,'gold',2);break;}
    case 'ascia':{
      opx(lunge-3,-2,36,5,'#5C3317');opx(lunge-3,-2,10,5,'#7B5030');opx(lunge+22,-2,14,5,'#4A2810');

}

/* ---------- GAME STATE ---------- */
const game={
  state:'title',mode:1,stage:0,sel:[0,1],pickTurn:0,tournament:null,difficulty:'normale',
  cpuDiff(){
    const finale=this.mode===3&&this.tournament&&this.tournament.idx===this.tournament.order.length-1;
    return finale?DIFFS.boss:DIFFS[this.difficulty];},
  p:[null,null],round:1,wins:[0,0],timer:99,timerF:0,
  banner:'',bannerT:0,freeze:0,koPending:false,matchWinner:null,
  reset(){particles=[];projectiles=[];floatTexts=[];frameTimers=[];shake=0;hitstop=0;whiteFlash=0;specialBanner=null;specialCutIn=null;},
  startMatch(){this.reset();this.playerLost=false;this.stage=(Math.random()*STAGES.length)|0;
    this.round=1;this.wins=[0,0];this.startRound();this.state='fight';},
  startTournament(){
    const me=this.sel[0];
    const order=ROSTER.map((c,i)=>({i,s:c.hp*0.4+c.power*7+c.speed*12+(c.def||5)*5+(c.id==='pisani'?999:0)}))
      .filter(o=>o.i!==me).sort((a,b)=>a.s-b.s).map(o=>o.i);
    this.tournament={order,idx:0,wins:0};
    this.sel[1]=order[0];this.startMatch();},
  startRound(){this.reset();
    this.p[0]=new Fighter(ROSTER[this.sel[0]],170,1,P1MAP);
    this.p[1]=new Fighter(ROSTER[this.sel[1]],470,-1,this.mode===2?P2MAP:'cpu');
    if(this.p[1].ctrl==='cpu'){const d=this.cpuDiff();this.p[1].aiDiff=d;
      this.p[1].maxHp=this.p[1].hp=Math.round(this.p[1].cfg.hp*d.hp);}
    this.timer=99;this.timerF=0;this.koPending=false;
    this.banner='ROUND '+this.round;this.bannerT=70;this.freeze=100;
    setTimeoutFrames(70,()=>{this.banner='COMBATTETE!';this.bannerT=30;sfx.ok();});},
  onKO(loser){if(this.koPending)return;this.koPending=true;
    const wIdx=this.p[0]===loser?1:0;this.wins[wIdx]++;
    this.banner='K.O.';this.bannerT=80;
    setTimeoutFrames(90,()=>{
      if(this.wins[wIdx]>=2){this.matchWinner=this.p[wIdx];
        this.playerLost=(this.mode!==2&&wIdx===1);
        if(this.mode===3&&wIdx===0&&this.tournament)this.tournament.wins++;
        this.state='victory';if(this.playerLost)sfx.ko();else sfx.ok();}
      else{this.round++;this.startRound();}});},
  timeout(){if(this.koPending)return;this.koPending=true;
    const h0=this.p[0].hp/this.p[0].maxHp,h1=this.p[1].hp/this.p[1].maxHp;
    const wIdx=h0>=h1?0:1;this.wins[wIdx]++;this.banner='TEMPO!';this.bannerT=80;
    setTimeoutFrames(90,()=>{
      if(this.wins[wIdx]>=2){this.matchWinner=this.p[wIdx];
        this.playerLost=(this.mode!==2&&wIdx===1);
        if(this.mode===3&&wIdx===0&&this.tournament)this.tournament.wins++;
        this.state='victory';}
      else{this.round++;this.startRound();}});},
};

/* ---------- UPDATE ---------- */
let kPrev={};
function kp(code){return !!keys[code]&&!kPrev[code];}

function update(){
  frame++;
  wantTrack=game.state==='fight'?'fight':game.state==='victory'?(game.playerLost?'lose':'win'):'menu';
  ensureMusic();
  if(kp('KeyM')){musicMuted=!musicMuted;if(!musicMuted&&curTrack)curTrack.play().catch(()=>{});}
  frameTimers=frameTimers.filter(t=>{if(--t.fr<=0){t.fn();return false}return true});
  if(whiteFlash>0)whiteFlash--;
  if(specialBanner&&--specialBanner.t<=0)specialBanner=null;
  if(specialCutIn&&--specialCutIn.t<=0)specialCutIn=null;

  if(game.state==='title'){
    if(kp('Digit1')||kp('Numpad1')){game.mode=1;game.tournament=null;game.state='select';game.pickTurn=0;sfx.ok();}
    if(kp('Digit2')||kp('Numpad2')){game.mode=2;game.tournament=null;game.state='select';game.pickTurn=0;sfx.ok();}
    if(kp('Digit3')||kp('Numpad3')){game.mode=3;game.tournament=null;game.state='select';game.pickTurn=0;sfx.ok();}
    if(kp('KeyD')){const ks=['facile','normale','difficile'];
      game.difficulty=ks[(ks.indexOf(game.difficulty)+1)%3];sfx.sel();}
  }
  else if(game.state==='select'){
    const turn=game.pickTurn;
    const map=turn===0?P1MAP:(game.mode===2?P2MAP:P1MAP);
    let s=game.sel[turn];
    if(kp(map.left)){s=(s+11)%12;sfx.sel();}
    if(kp(map.right)){s=(s+1)%12;sfx.sel();}
    if(kp(map.up)||kp(map.down)){s=(s+6)%12;sfx.sel();}
    game.sel[turn]=s;
    if(kp(map.punch)||kp('Enter')){sfx.ok();
      if(turn===0){
        if(game.mode===3)game.startTournament();
        else{game.pickTurn=1;if(game.sel[1]===game.sel[0])game.sel[1]=(game.sel[0]+1)%12;}}
      else game.startMatch();}
    if(kp('KeyR')){game.sel[turn]=(Math.random()*12)|0;sfx.ok();
      if(turn===0){if(game.mode===3)game.startTournament();else game.pickTurn=1;}
      else game.startMatch();}
    if(kp('Escape')){if(game.pickTurn===1)game.pickTurn=0;else game.state='title';}
  }
  else if(game.state==='fight'){
    if(hitstop>0){hitstop--;}
    else{
      if(game.freeze>0)game.freeze--;
      const [a,b]=game.p;
      if(game.freeze<=0&&!game.koPending){
        a.readInput(b);b.readInput(a);
        a.update(b);b.update(a);
        const ha=a.hurtbox(),hb2=b.hurtbox();
        if(aabb(ha,hb2)&&a.state!=='ko'&&b.state!=='ko'){
          const ov=(Math.min(ha.x+ha.w,hb2.x+hb2.w)-Math.max(ha.x,hb2.x))/2;
          const d=Math.sign(b.x-a.x)||1;a.x-=ov*d;b.x+=ov*d;}
        if(++game.timerF>=60){game.timerF=0;if(--game.timer<=0)game.timeout();}
      }else{a.input={};b.input={};a.update(b);b.update(a);}
      // camera parallasse
      const target=clamp(((a.x+b.x)/2-W/2)*.3,-44,44);
      camX+=(target-camX)*.08;
      // proiettili
      projectiles=projectiles.filter(p=>{
        p.x+=p.vx;p.y+=p.vy;if(p.grav)p.vy+=p.grav;p.life--;
        if(frame%3===0)particles.push({x:p.x,y:p.y,vx:0,vy:0,life:6,max:6,col:p.col,sz:2});
        const tgt=p.owner===game.p[0]?game.p[1]:game.p[0];
        const hb={x:p.x-p.w/2,y:p.y-p.h/2,w:p.w,h:p.h};
        let boom=false;
        if(tgt.state!=='ko'&&aabb(hb,tgt.hurtbox())){boom=true;
          if(p.aoe)explode(p,tgt);else tgt.takeDamage(p.dmg*(p.owner.cfg.power/7)*p.owner.dmgMul,p.kb,p.owner);}
        if(p.bounceKill&&p.y>=GROUND-4){explode(p,tgt);boom=true;}
        if(p.x<-30||p.x>W+30)return false;
        return !boom&&p.life>0;});
    }
    if(game.bannerT>0)game.bannerT--;
    updateFx();
    if(kp('Escape')){game.state='select';game.pickTurn=0;}
  }
  else if(game.state==='victory'){
    if(!game.playerLost){vcfxFrame=vcfxFrame||0;vcfxFrame++;}
    updateFx();
    if(kp('Enter')||kp('KeyZ')){sfx.ok();vcfxFrame=0;
      const t=game.tournament;
      if(game.mode===3&&t&&!game.playerLost&&t.idx<t.order.length-1){
        t.idx++;game.sel[1]=t.order[t.idx];game.startMatch();}
      else{game.tournament=null;game.state='select';game.pickTurn=0;}}
    if(kp('Escape')){game.tournament=null;game.state='title';}
  }
  kPrev={...keys};
}
function updateFx(){
  particles=particles.filter(p=>{
    if(p.ring){p.r+=p.growth;return --p.life>0&&p.r<p.maxR*1.2;}
    p.x+=p.vx;p.y+=p.vy;if(p.grav)p.vy+=p.grav;
    if(p.splat&&p.y>=GROUND){p.y=GROUND;p.vx*=.5;p.vy=0;}
    return --p.life>0;});
  floatTexts=floatTexts.filter(t=>{t.y-=0.6;return --t.life>0;});
  if(shake>0)shake*=0.85;
}
function explode(p,tgt){
  sfx.boom();shake=Math.max(shake,9);whiteFlash=1;
  for(let i=0;i<22;i++)particles.push({x:p.x,y:p.y,vx:rnd(-4.5,4.5),vy:rnd(-4.5,2),life:rnd(12,26),max:26,
    col:['#FF6A00','#FFB000','#FFE94A','#777'][i%4],sz:rnd(3,7)});
  smokePuff(p.x,p.y-8,8);
  const r=p.aoe||50,hb={x:p.x-r,y:p.y-r,w:r*2,h:r*2};
  if(tgt.state!=='ko'&&aabb(hb,tgt.hurtbox()))tgt.takeDamage(p.dmg*(p.owner.cfg.power/7)*p.owner.dmgMul,p.kb,p.owner);
}

function text(t,x,y,sz,col,align='center'){ctx.fillStyle=col;ctx.font='bold '+sz+'px monospace';ctx.textAlign=align;ctx.fillText(t,x,y);}
function outlineText(t,x,y,sz,col,align='center'){ctx.font='bold '+sz+'px monospace';ctx.textAlign=align;
  ctx.fillStyle='#000';for(const[ox,oy]of[[-2,0],[2,0],[0,-2],[0,2]])ctx.fillText(t,x+ox,y+oy);
  ctx.fillStyle=col;ctx.fillText(t,x,y);}

    const r=f.hp/f.maxHp,col=r>.5?'#2ECC40':r>.25?'#FFDC00':'#FF4136';
    const w=246*r;pxs(flip?x+2+246-w:x+2,16,w,12,col);
    pxs(flip?x+2+246-w:x+2,16,w,4,lift(col,.4));

    pxs(x,33,250,7,'#0B3954');
    const sw=246*f.stamina/100;pxs(flip?x+2+246-sw:x+2,34,sw,5,'#39CCCC');

    outlineText(f.cfg.name,flip?x+250:x,66,12,f.cfg.ui||f.cfg.brow,flip?'right':'left');
    for(let i=0;i<2;i++)pxs(flip?x+250-12-i*14:x+i*14,71,10,6,game.wins[side]>i?'#FFD700':'#3A3A3A');
    if(f.combo>1)outlineText(f.combo+' COMBO x'+COMBO_MUL[Math.min(f.combo,3)],flip?x+250:x,92,13,'#FFD700',flip?'right':'left');

  text('PUGNO+CALCIO insieme (o SPAZIO / I) = SPECIAL quando la barra gialla \u00E8 piena',W/2,H-6,8.5,'rgba(245,240,225,.45)');

function draw(){
  ctx.save();
  if(shake>0.5)ctx.translate(rnd(-shake,shake),rnd(-shake,shake));
  if(game.state==='title')drawTitle();
  else if(game.state==='select')drawSelect();
  else if(game.state==='fight')drawFight();
  else if(game.state==='victory')drawVictory();
  ctx.restore();
  if(whiteFlash>0){ctx.globalAlpha=.85;ctx.fillStyle='#FFF';ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;}
}

function drawTitle(){
  ctx.fillStyle='#0E0A06';ctx.fillRect(0,0,W,H);
  ROSTER.forEach((c,i)=>{const x=(i*97+frame*.4)%(W+60)-30,y=70+(i%4)*100+Math.sin(frame*.03+i)*8;
    ctx.globalAlpha=.25;ctx.fillStyle=c.brow;ctx.fillRect(x,y,26,7);ctx.fillRect(x+34,y,26,7);ctx.globalAlpha=1;});
  outlineText('LE SOPRACCIGLIA',W/2,140,38,'#FFD700');
  outlineText('DELLA GUERRA',W/2,185,38,'#FFD700');
  text('A R E N A   C O M B A T',W/2,218,16,'#DC143C');
  text('\u2014 METAL SLUG EDITION \u2014',W/2,240,11,'#FF8C00');
  text('Dal racconto corale dell\u2019ufficio di Siena',W/2,262,11,'#B7A98C');
  if(frame%60<40){outlineText('[1] GIOCATORE vs CPU',W/2,312,15,'#F5F0E1');
    outlineText('[2] GIOCATORI',W/2,336,15,'#F5F0E1');
    outlineText('[3] TORNEO \u2014 sfida tutti, dal pi\u00F9 debole al boss',W/2,360,15,'#FF8C00');}
  outlineText('[D] Difficolt\u00E0 CPU: '+DIFFS[game.difficulty].label,W/2,384,12,game.difficulty==='difficile'?'#FF4136':game.difficulty==='facile'?'#2ECC40':'#F5F0E1');
  text('P1: frecce + Z pugno / X calcio / C parata / SPAZIO special',W/2,406,10,'#8A7E68');
  text('P2: WASD + L pugno / K calcio / J parata / I special',W/2,422,10,'#8A7E68');
  text('SPECIAL = Pugno+Calcio INSIEME quando la barra gialla supera la tacca',W/2,444,10,'#FFD700');
  text('PARRY: tocca la parata un istante prima dell\u2019impatto \u2192 stordisce 2s  \u2022  [M] musica on/off',W/2,460,9,'#8A7E68');
}

function drawSelect(){
  ctx.fillStyle='#120D08';ctx.fillRect(0,0,W,H);
  outlineText('SCEGLI IL TUO COMBATTENTE',W/2,36,18,'#FFD700');
  const cs=86,gx=(W-6*(cs+8))/2+4,gy=56;
  ROSTER.forEach((c,i)=>{
    const col=i%6,row=(i/6)|0,x=gx+col*(cs+8),y=gy+row*(cs+34);
    drawPortrait(c,x,y,cs);
    text(c.name,x+cs/2,y+cs+12,8.5,'#F5F0E1');
    if(game.sel[0]===i){ctx.strokeStyle='#FFD700';ctx.lineWidth=3;ctx.strokeRect(x-2,y-2,cs+4,cs+4);}
    if(game.pickTurn===1&&game.sel[1]===i){ctx.strokeStyle='#DC143C';ctx.lineWidth=3;ctx.strokeRect(x-5,y-5,cs+10,cs+10);}
  });
  const cur=ROSTER[game.sel[game.pickTurn]],s=cur.special;
  outlineText(cur.name+' \u2014 '+cur.title,W/2,gy+2*(cs+34)+22,14,cur.ui||cur.brow);
  text('SPECIAL: '+s.name+'  ('+s.dmg+' dmg \u2022 costo '+s.cost+' \u2022 CD '+(s.cd/60).toFixed(1)+'s)   |   HP '+cur.hp+'  VEL '+Math.round(cur.speed*2)+'  POT '+cur.power+'  DEF '+cur.def,W/2,gy+2*(cs+34)+42,10,'#B7A98C');
  const hint1=game.mode===2?'P2: scegli il tuo lottatore (L o Z conferma \u2022 R casuale)':'Scegli l\u2019AVVERSARIO della CPU (Z conferma \u2022 R casuale \u2022 ESC indietro)';
  const hint0=game.mode===3?'TORNEO: scegli il tuo CAMPIONE (Z conferma \u2022 R casuale)':'P1: scegli il tuo lottatore (Z conferma \u2022 R casuale)';
  text(game.pickTurn===0?hint0:hint1,W/2,H-12,11,game.pickTurn===0?(game.mode===3?'#FF8C00':'#FFD700'):'#DC143C');
}

function drawFight(){
  STAGES[game.stage].draw(camX);
  text(STAGES[game.stage].name,W/2,H-18,9,'rgba(245,240,225,.35)');
  ctx.save();ctx.translate(-camX*0.0,0); // fighters in world≈screen, cam già nei layer
  const ps=[...game.p].sort((a,b)=>(a.state==='attack'?1:0)-(b.state==='attack'?1:0));
  ps.forEach(drawFighter);
  projectiles.forEach(p=>{pxs(p.x-p.w/2,p.y-p.h/2,p.w,p.h,p.col);pxs(p.x-p.w/2,p.y-p.h/2,p.w,1,'#FFF');});
  particles.forEach(p=>{
    ctx.globalAlpha=clamp(p.life/(p.max||20),0,1)*(p.fade?.7:1);
    if(p.ring){ctx.strokeStyle=p.col;ctx.lineWidth=3;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,7);ctx.stroke();
      ctx.globalAlpha*=.4;ctx.strokeStyle='#E8C8FF';ctx.lineWidth=1;ctx.beginPath();ctx.arc(p.x,p.y,p.r-3,0,7);ctx.stroke();}
    else if(p.bar)pxs(p.x,p.y,p.w,p.h,p.col);
    else if(p.star){pxs(p.x-1,p.y-3,3,7,p.col);pxs(p.x-3,p.y-1,7,3,p.col);}
    else pxs(p.x,p.y,p.sz,p.sz,p.col);
    ctx.globalAlpha=1;});
  floatTexts.forEach(t=>{outlineText(t.txt,t.x,t.y,t.sz,t.col);});
  if(specialCutIn){ctx.fillStyle='rgba(0,0,0,'+(.5*specialCutIn.t/22).toFixed(2)+')';
    ctx.fillRect(0,0,W,H);drawFighter(specialCutIn.f);}
  ctx.restore();
  drawHUD();
  if(specialBanner)outlineText(specialBanner.txt,W/2,H/2-70,20,'#FF2222');
  if(game.bannerT>0){const big=game.banner==='K.O.';
    outlineText(game.banner,W/2,H/2-20,big?64:34,big?'#FF4136':'#FFD700');}
}

/* Victory-pose: usa l'immagine reale del personaggio */
function drawVictoryPose(f,vcfg,t){
  const img=SPRITES[f.cfg.id];
  if(!img||!img.complete||img.naturalWidth===0){
    // fallback: disegna il fighter procedurale
    const ox=f.x,oy=f.y,os=f.state,ocur=f.cur,oaT=f.animT;
    f.animT=t; f.x=W*.26; f.y=GROUND; f.facing=1; f.state='idle'; f.cur=null;
    const sc=Math.min(200/f.cfg.h,1.6);
    ctx.save();ctx.translate(W*.26,GROUND);ctx.scale(sc,sc);ctx.translate(-W*.26/sc,-GROUND/sc);
    drawFighter(f);ctx.restore();
    f.x=ox;f.y=oy;f.state=os;f.cur=ocur;f.animT=oaT;return;}
  // Immagine reale: altezza target 320px, centrata sul terzo sinistro
  const targetH=320;
  const targetW=Math.round(img.naturalWidth*targetH/img.naturalHeight);
  const drawX=Math.round(W*.05+(W*.42-targetW)/2); // centrata nel blocco sinistro
  const drawY=Math.round(H*.92-targetH);            // piedi a 92% dello schermo
  // ombra sotto il personaggio
  const shadowW=targetW*.6;
  ctx.save();
  ctx.globalAlpha=.35;
  ctx.fillStyle='#000';
  ctx.beginPath();
  ctx.ellipse(drawX+targetW/2,H*.92+6,shadowW/2,10,0,0,Math.PI*2);
  ctx.fill();
  ctx.globalAlpha=1;
  // glow del colore delle sopracciglia intorno all'immagine
  const pulse=.25+.2*Math.sin(t*.07);
  ctx.shadowBlur=32*pulse;
  ctx.shadowColor=f.cfg.brow||'#FFD700';
  ctx.drawImage(img,drawX,drawY,targetW,targetH);
  ctx.shadowBlur=0;
  // rim light overlay: gradiente laterale sul lato dx
  const rimG=ctx.createLinearGradient(drawX,0,drawX+targetW,0);
  rimG.addColorStop(0,'rgba(0,0,0,0)');
  rimG.addColorStop(.7,'rgba(0,0,0,0)');
  rimG.addColorStop(1,hexToRgba(f.cfg.brow||'#FFD700',pulse*.5));
  ctx.fillStyle=rimG;
  ctx.fillRect(drawX,drawY,targetW,targetH);
  ctx.restore();
}
function hexToRgba(hex,a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return 'rgba('+r+','+g+','+b+','+a.toFixed(2)+')';}

function drawVictory(){
  const wf=game.matchWinner,lost=game.playerLost;
  const t=frame; // timer globale dell'animazione

  if(lost){
    // === SCHERMATA SCONFITTA (invariata, semplice) ===
    STAGES[game.stage].draw(camX);
    drawFighter(wf);
    ctx.fillStyle='rgba(40,0,0,.68)';ctx.fillRect(0,0,W,H);
    outlineText('SCONFITTA',W/2,130,44,'#FF4136');
    outlineText(wf.cfg.name+' trionfa',W/2,175,20,wf.cfg.ui||wf.cfg.brow);
    ctx.font='italic 12px monospace';ctx.textAlign='center';ctx.fillStyle='#F5F0E1';
    wrapText('\u201C'+wf.cfg.quote+'\u201D',W/2,220,440,16);
    text('Le tue sopracciglia si spengono lentamente...',W/2,278,11,'#B05050');
    if(game.mode===3&&game.tournament)
      outlineText('TORNEO CONCLUSO \u2014 VITTORIE: '+game.tournament.wins+'/'+game.tournament.order.length,W/2,302,14,'#FF8C00');
    if(frame%60<40)text(game.mode===3?'[INVIO] nuovo torneo   [ESC] titolo':'[INVIO] riprova   [ESC] titolo',W/2,328,12,'#B7A98C');
    return;
  }

  // === VICTORY SCREEN PERSONALIZZATA ===
  const vcfg=VICTORY_CFG[wf.cfg.id]||VICTORY_CFG.iacopo;
  const introT=Math.min(t,30)/30; // 0→1 nei primi 30 frame
  const textT=Math.max(0,Math.min(t-60,30))/30; // testo appare dopo 1s

  // BG personalizzato
  vcfg.bg(t);

  // vignetta nera ai bordi
  ctx.save();
  const vg=ctx.createRadialGradient(W/2,H*.45,H*.18,W/2,H*.45,H*.72);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,.72)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);ctx.restore();

  // fighter effetti speciali (prima del fighter per stay under)
  vcfg.wfx(wf,t);
  particles.forEach(p=>{
    ctx.globalAlpha=clamp(p.life/(p.max||20),0,1)*(p.fade?.7:1);
    if(p.ring){ctx.strokeStyle=p.col;ctx.lineWidth=3;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,7);ctx.stroke();}
    else if(p.bar)pxs(p.x,p.y,p.w,p.h,p.col);
    else if(p.star){pxs(p.x-1,p.y-3,3,7,p.col);pxs(p.x-3,p.y-1,7,3,p.col);}
    else pxs(p.x,p.y,p.sz,p.sz,p.col);
    ctx.globalAlpha=1;});

  // fighter grande al centro-sinistra
  drawVictoryPose(wf,vcfg,t);

  // RIM LIGHT esagerato in victory
  ctx.globalAlpha=.4+.2*Math.sin(t*.06);
  ctx.fillStyle=wf.cfg.brow||'#FFD700';
  ctx.fillRect(Math.round(W*.48-4),Math.round(H*.15),3,Math.round(H*.7));
  ctx.globalAlpha=1;

  // GLOW SOPRACCIGLIA pulsante intenso
  const browPulse=.45+.45*Math.sin(t*.07);
  ctx.globalAlpha=browPulse*.6;
  const bg2=ctx.createRadialGradient(W*.38+wf.cfg.h*.06,GROUND-wf.cfg.h*1.47,4,W*.38+wf.cfg.h*.06,GROUND-wf.cfg.h*1.47,28);
  bg2.addColorStop(0,wf.cfg.brow||'#FFD700');bg2.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=bg2;ctx.fillRect(W*.26-50,H*.08,140,50);
  ctx.globalAlpha=1;

  // PANNELLO TESTO: semi-trasparente a destra
  const px2=W*.48,pw=W*.48,ptop=H*.1,ph=H*.58;
  ctx.globalAlpha=introT*.55;ctx.fillStyle='#000';
  ctx.fillRect(px2,ptop,pw,ph);
  ctx.globalAlpha=introT*.7;ctx.strokeStyle=wf.cfg.brow||'#FFD700';ctx.lineWidth=2;
  ctx.strokeRect(px2,ptop,pw,ph);ctx.globalAlpha=1;

  // NOME grande con glow
  const nameGlow=.6+.4*Math.sin(t*.06);
  ctx.save();ctx.globalAlpha=introT;
  ctx.font='bold 38px monospace';ctx.textAlign='center';
  ctx.shadowBlur=18*nameGlow;ctx.shadowColor=wf.cfg.brow||'#FFD700';
  ctx.fillStyle=wf.cfg.ui||wf.cfg.brow||'#FFD700';
  ctx.fillText(wf.cfg.name,px2+pw/2,ptop+52);
  ctx.shadowBlur=0;ctx.restore();

  // TITOLO
  ctx.globalAlpha=introT*.8;ctx.font='italic 14px monospace';ctx.textAlign='center';
  ctx.fillStyle='#F5F0E1';ctx.fillText(wf.cfg.title,px2+pw/2,ptop+74);ctx.globalAlpha=1;

  // SEPARATORE
  if(introT>.5){ctx.globalAlpha=(introT-.5)/.5;ctx.fillStyle=wf.cfg.brow||'#FFD700';
    ctx.fillRect(px2+16,ptop+84,pw-32,2);ctx.globalAlpha=1;}

  // STATISTICHE match
  const R=game.tournament;
  ctx.save();ctx.globalAlpha=introT*.75;ctx.font='11px monospace';ctx.textAlign='left';ctx.fillStyle='#D0C8A0';
  if(wf.hp===wf.maxHp){ctx.fillStyle='#FFD700';ctx.fillText('\u2605 VITTORIA PERFETTA \u2605',px2+18,ptop+106);}
  else ctx.fillText('HP rimanenti: '+wf.hp+'/'+wf.maxHp,px2+18,ptop+106);
  if(wf.combo>1)ctx.fillText('Combo max: \u00d7'+COMBO_MUL[Math.min(wf.combo,3)],px2+18,ptop+122);
  if(game.mode===3&&R)ctx.fillText('Torneo: '+R.wins+'/'+(R.idx+1)+' vittorie',px2+18,ptop+138);
  ctx.restore();

  // CITAZIONE PERSONALIZZATA (fade-in dopo 1s)
  if(textT>0){
    ctx.save();ctx.globalAlpha=textT*.9;
    ctx.font='italic 12px monospace';ctx.textAlign='center';ctx.fillStyle='#F5F0E1';
    wrapText('\u201C'+vcfg.quote+'\u201D',px2+pw/2,ptop+172,pw-28,16);
    ctx.restore();}

  // TORNEO: prossimo sfidante
  if(game.mode===3&&R&&textT>.5){
    ctx.globalAlpha=(textT-.5)/.5*.85;ctx.fillStyle='rgba(0,0,0,.5)';
    ctx.fillRect(px2,ptop+ph-54,pw,54);ctx.globalAlpha=1;
    if(R.idx<R.order.length-1){
      outlineText('INCONTRO '+(R.idx+1)+'/'+R.order.length+' SUPERATO',px2+pw/2,ptop+ph-30,11,'#FF8C00');
      text('Prossimo: '+ROSTER[R.order[R.idx+1]].name,px2+pw/2,ptop+ph-14,11,'#F5F0E1');
    }else outlineText('\u2605 CAMPIONE DEL TORNEO! '+R.wins+'/'+R.order.length+' \u2605',px2+pw/2,ptop+ph-20,14,'#FFD700');}

  // PROMPT
  const pTxt=game.mode===3&&R&&R.idx<R.order.length-1?'[INVIO] prossimo incontro   [ESC] abbandona':'[INVIO] nuova sfida   [ESC] titolo';
  if(frame%60<40)text(pTxt,W/2,H-10,10,'#B7A98C');

  // screen flash all'inizio (0-10fr)
  if(t<10){ctx.globalAlpha=(1-t/10)*.85;ctx.fillStyle='#FFFFFF';ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;}
}
function wrapText(t,x,y,maxW,lh){
  const words=t.split(' ');let line='',yy=y;
  for(const w of words){const test=line+w+' ';
    if(ctx.measureText(test).width>maxW){ctx.fillText(line,x,yy);line=w+' ';yy+=lh;}else line=test;}
  ctx.fillText(line,x,yy);
}

var _dbgTouch='', _dbgKeys='';
/* ---------- LOOP ---------- */
function loop(){
  try{update();}catch(e){
    ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#FF4136';ctx.font='14px monospace';ctx.textAlign='center';
    ctx.fillText('ERR update: '+e.message,W/2,H/2-20);
    ctx.fillText(String(e.stack||'').slice(0,120),W/2,H/2+10);
  }
  try{draw();}catch(e){
    ctx.fillStyle='#FF4136';ctx.font='14px monospace';ctx.textAlign='center';
    ctx.fillText('ERR draw: '+e.message,W/2,H/2+40);
  }
  /* debug tasti: mostra quali keys sono attivi */
  if(game && game.state==='fight'){
    var dbgK=[];
    ['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','KeyZ','KeyX','KeyC','Space'].forEach(function(k){if(keys[k])dbgK.push(k);});
    ctx.fillStyle='rgba(0,0,0,0.75)';ctx.fillRect(0,0,W,18);
    ctx.fillStyle='#0F0';ctx.font='11px monospace';ctx.textAlign='left';
    var p1=game.p&&game.p[0];
    ctx.fillText('frz='+game.freeze+' st='+(p1&&p1.state)+' KEYS='+dbgK.join(','),4,13);
  }
  requestAnimationFrame(loop);
}
loop();

   ============================================================ */
(function(){
  var IS_MOB = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
  if(!IS_MOB) return;

  /* Mappa elemento → codice tasto */
  var ELEM_KEYS = {
    'dp-u':'ArrowUp','dp-l':'ArrowLeft','dp-r':'ArrowRight','dp-d':'ArrowDown',
    'ab-p':'KeyZ','ab-k':'KeyX','ab-b':'KeyC','ab-s':'Space'
  };

  /* touchId → codice tasto */
  var touchMap = {};

  /* Trova quale elemento di controllo è sotto il punto (cx, cy) */
  function elemAtPoint(cx, cy){
    var ids = Object.keys(ELEM_KEYS);
    for(var i=0;i<ids.length;i++){
      var el = document.getElementById(ids[i]);
      if(!el) continue;
      var r = el.getBoundingClientRect();
      /* aggiungi 8px di margine per facilità */
      if(cx >= r.left-8 && cx <= r.right+8 && cy >= r.top-8 && cy <= r.bottom+8)
        return ids[i];
    }
    return null;
  }

  function pressElem(id, val){
    if(!id) return;
    var code = ELEM_KEYS[id];
    keys[code] = val;
    var el = document.getElementById(id);
    if(el){ if(val) el.classList.add('on'); else el.classList.remove('on'); }
  }

  function onTouchStart(e){
    if(game.state !== 'fight') return;
    e.preventDefault();
    for(var i=0;i<e.changedTouches.length;i++){
      var t = e.changedTouches[i];
      var id = elemAtPoint(t.clientX, t.clientY);
      if(id){ touchMap[t.identifier] = id; pressElem(id, true); }
    }
  }
  function onTouchEnd(e){
    if(game.state !== 'fight') return;
    e.preventDefault();
    for(var i=0;i<e.changedTouches.length;i++){
      var t = e.changedTouches[i];
      pressElem(touchMap[t.identifier], false);
      delete touchMap[t.identifier];
    }
  }
  function onTouchMove(e){
    e.preventDefault(); /* previene scroll su iOS */
    if(game.state !== 'fight') return;
    for(var i=0;i<e.changedTouches.length;i++){
      var t = e.changedTouches[i];
      var newId = elemAtPoint(t.clientX, t.clientY);
      var oldId = touchMap[t.identifier];
      /* cambia tasto solo se il dito va su un ALTRO pulsante, non se esce nel vuoto */
      if(newId && newId !== oldId){
        pressElem(oldId, false);
        touchMap[t.identifier] = newId;
        pressElem(newId, true);
      }
    }
  }

  document.addEventListener('touchstart',  onTouchStart,  {passive:false});
  document.addEventListener('touchend',    onTouchEnd,    {passive:false});
  document.addEventListener('touchcancel', onTouchEnd,    {passive:false});
  document.addEventListener('touchmove',   onTouchMove,   {passive:false});

  /* ---- navigazione (title / select / victory) — fight gestito da zone sopra ---- */
  document.addEventListener('touchstart', function(e){
    audioUnlocked = true;
    try{ if(AC && AC.state==='suspended') AC.resume(); }catch(_){}
    if(game.state === 'fight') return; /* fight gestito dal zone handler */

    var touch = e.changedTouches[0];

    /* --- TITLE: tappa ovunque nella metà inferiore per scegliere --- */
    if(game.state === 'title'){
      e.preventDefault();
      /* Calcola zona dal canvas se il tocco è sul canvas, altrimenti usa posizione schermo */
      var cvEl = document.getElementById('cv');
      var rect = cvEl ? cvEl.getBoundingClientRect() : null;
      var ty = rect ? (touch.clientY - rect.top) * (480 / rect.height) : 999;
      var tx = rect ? (touch.clientX - rect.left) * (640 / rect.width) : 999;
      var inCanvas = rect && touch.clientX>=rect.left && touch.clientX<=rect.right && touch.clientY>=rect.top && touch.clientY<=rect.bottom;

      if(inCanvas){
        /* Zone basate su dove il testo è disegnato nel canvas (drawTitle) */
        if(ty >= 290 && ty < 330){
          game.mode=1; game.tournament=null; game.state='select'; game.pickTurn=0;
          try{sfx.ok();}catch(_){} updateOverlay(); return;
        }
        if(ty >= 330 && ty < 355){
          game.mode=2; game.tournament=null; game.state='select'; game.pickTurn=0;
          try{sfx.ok();}catch(_){} updateOverlay(); return;
        }
        if(ty >= 355 && ty < 385){
          game.mode=3; game.tournament=null; game.state='select'; game.pickTurn=0;
          try{sfx.ok();}catch(_){} updateOverlay(); return;
        }
        if(ty >= 385 && ty < 410){
          var ks=['facile','normale','difficile'];
          game.difficulty=ks[(ks.indexOf(game.difficulty)+1)%3];
          try{sfx.sel();}catch(_){} return;
        }
      } else {
        /* Tocco fuori canvas → avvia modalità 1 direttamente */
        game.mode=1; game.tournament=null; game.state='select'; game.pickTurn=0;
        try{sfx.ok();}catch(_){} updateOverlay();
      }
      return;
    }

    /* --- SELECT: tap sui ritratti personaggio --- */
    if(game.state === 'select'){
      var cvEl = document.getElementById('cv');
      var rect = cvEl ? cvEl.getBoundingClientRect() : null;
      if(!rect) return;
      var tx = (touch.clientX - rect.left) * (640 / rect.width);
      var ty = (touch.clientY - rect.top)  * (480 / rect.height);
      /* Zona "Indietro" (angolo alto sinistra del canvas) */
      if(tx < 80 && ty < 50){
        if(game.pickTurn===1) game.pickTurn=0; else game.state='title';
        try{sfx.sel();}catch(_){} updateOverlay(); return;
      }
      /* Zona "Casuale" (angolo alto destra del canvas) */
      if(tx > 560 && ty < 50){
        game.sel[game.pickTurn]=(Math.random()*12)|0;
        try{sfx.ok();}catch(_){}
        if(game.pickTurn===0){ if(game.mode===3) game.startTournament(); else game.pickTurn=1; }
        else game.startMatch();
        updateOverlay(); return;
      }
      /* Griglia personaggi */
      var cs=86, gx=(640-6*(cs+8))/2+4, gy=56;
      for(var i=0;i<12;i++){
        var col=i%6, row=(i/6)|0;
        var x=gx+col*(cs+8), y=gy+row*(cs+34);
        if(tx>=x && tx<=x+cs && ty>=y && ty<=y+cs){
          e.preventDefault();
          game.sel[game.pickTurn]=i;
          try{sfx.sel();}catch(_){}
          clearTimeout(window._mst);
          window._mst=setTimeout(function(){
            try{sfx.ok();}catch(_){}
            if(game.pickTurn===0){
              if(game.mode===3) game.startTournament();
              else{ game.pickTurn=1; if(game.sel[1]===game.sel[0]) game.sel[1]=(game.sel[0]+1)%12; }
            } else game.startMatch();
            updateOverlay();
          },300);
          break;
        }
      }
      return;
    }

    /* --- VICTORY: tocca per continuare --- */
    if(game.state==='victory'){
      e.preventDefault();
      keys['Enter']=true; setTimeout(function(){ keys['Enter']=false; },120);
      return;
    }

  }, {passive:false});

  /* ---- overlay fight controls (D-pad + bottoni azione) ---- */
  function updateOverlay(){
    var s = game.state;
    function sh(id,v){ var el=document.getElementById(id); if(el) el.style.display=v; }
    sh('menu-btns',  'none');
    sh('select-btns','none');
    sh('m-controls', s==='fight' ? 'block' : 'none');
    sh('m-esc',      (s==='fight'||s==='victory') ? 'block':'none');
    sh('m-back',     'none');
    sh('m-music',    'none');
  }

  /* Polling stato → aggiorna overlay fight controls automaticamente */
  var _prev='';
  setInterval(function(){
    if(game && game.state!==_prev){ _prev=game.state; updateOverlay(); }
  },80);

  updateOverlay();
  document.addEventListener('touchmove', function(e){ e.preventDefault(); },{passive:false});

})();
</script>
</body>
</html>
